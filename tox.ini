[tox]
isolated_build = True
envlist =
    lint
    py313

[testenv:lint]
description = run linters and formatters
allowlist_externals = poetry
commands_pre =
    poetry install --all-extras
commands =
    poetry run ruff format
;    poetry run ruff check
;    poetry run mypy .

[testenv]
description = run pytest and coverage
allowlist_externals = poetry
commands_pre =
    poetry install --all-extras
commands =
    poetry run coverage run --source=python_polarion_utils --branch -m pytest . --junitxml="junittest.xml"
    poetry run coverage report -m --fail-under 2
    poetry run coverage xml

[pytest]
addopts =
    --ignore=python_polarion_utils/api/test_data.py
