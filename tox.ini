[tox]
isolated_build = True
envlist =
    ruff
    mypy
    python-sbb-polarion-linter
    py{311,313,314}
    verify-openapi-mapping

[testenv:ruff]
description = run ruff linter and formatter
allowlist_externals = uv
commands_pre =
    uv sync --group dev
commands =
    uv run ruff format --check python_sbb_polarion
    uv run ruff check

[testenv:mypy]
description = run mypy type checker
allowlist_externals = uv
commands_pre =
    uv sync --group dev
commands =
    uv run mypy .

[testenv:python-sbb-polarion-linter]
description = run python-sbb-polarion custom code style linter (PSP001-PSP017)
allowlist_externals = uv
commands_pre =
    uv sync --group dev
commands =
    uv run python -m python_sbb_polarion.linter python_sbb_polarion tests

[testenv]
description = run tests with pytest (executes unittest.TestCase tests)
allowlist_externals = uv
commands_pre =
    uv sync --group dev --group test
commands =
    uv run pytest tests/unit \
        --cov=python_sbb_polarion \
        --cov-branch \
        --cov-report=term-missing:skip-covered \
        --cov-report=xml \
        --cov-fail-under=95 \
        --junitxml=junittest.xml \
        -v

[testenv:verify-openapi-mapping]
description = verify extension API mappings against OpenAPI specs from GitHub
allowlist_externals = uv
skip_install = false
commands_pre =
    uv sync --group dev --group test
commands =
    uv run python -m tests.verification
setenv =
    VALIDATE_PARAMETERS=true
passenv =
    GITHUB_TOKEN
