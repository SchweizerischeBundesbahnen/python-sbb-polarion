[tox]
envlist =
    ruff
    mypy
    python-sbb-polarion-linter
    py{311,313,314}
    verify-openapi-mapping

[testenv]
runner = uv-venv-lock-runner
package = skip
dependency_groups =
    dev
    test
commands =
    pytest tests/unit \
        --cov=python_sbb_polarion \
        --cov-branch \
        --cov-report=term-missing:skip-covered \
        --cov-report=xml \
        --cov-fail-under=95 \
        --junitxml=junittest.xml \
        -v

[testenv:ruff]
description = run ruff linter and formatter
dependency_groups = dev
commands =
    ruff format --check python_sbb_polarion
    ruff check

[testenv:mypy]
description = run mypy type checker
dependency_groups = dev
commands =
    mypy .

[testenv:python-sbb-polarion-linter]
description = run python-sbb-polarion custom code style linter (PSP001-PSP017)
dependency_groups = dev
commands =
    python -m python_sbb_polarion.linter python_sbb_polarion tests

[testenv:verify-openapi-mapping]
description = verify extension API mappings against OpenAPI specs from GitHub
dependency_groups =
    dev
    test
commands =
    python -m tests.verification
setenv =
    VALIDATE_PARAMETERS=true
passenv =
    GITHUB_TOKEN
