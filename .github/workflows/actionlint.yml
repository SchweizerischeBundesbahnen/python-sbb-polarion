---
name: ActionLint
on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']
  workflow_dispatch:
permissions: {}
jobs:
  actionlint:
    uses: SchweizerischeBundesbahnen/github-workflows-polarion/.github/workflows/reusable-actionlint.yml@main  # zizmor: ignore[unpinned-uses]
    permissions:
      checks: write
      contents: read
